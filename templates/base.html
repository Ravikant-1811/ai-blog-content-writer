<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}AI Blog Content Writer{% endblock %}</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --accent: #0f766e;
      --accent-dark: #115e59;
      --danger: #b91c1c;
      --ok: #065f46;
      --border: #d1d5db;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, sans-serif;
      background: linear-gradient(180deg, #eef5ff 0%, var(--bg) 100%);
      color: var(--text);
    }
    .container {
      max-width: 980px;
      margin: 24px auto;
      padding: 0 16px 24px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
      box-shadow: 0 10px 28px rgba(10, 20, 40, 0.06);
      margin-bottom: 16px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 28px;
    }
    h2 {
      margin-top: 0;
    }
    .sub {
      color: var(--muted);
      margin: 0;
    }
    label {
      display: block;
      font-weight: 600;
      margin-bottom: 6px;
    }
    input[type="text"],
    input[type="password"],
    input[type="number"],
    textarea {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 14px;
      outline: none;
      background: #fff;
    }
    input:focus, textarea:focus {
      border-color: #0ea5e9;
      box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.15);
    }
    textarea {
      min-height: 220px;
      resize: vertical;
      line-height: 1.5;
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .grid-3 {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr;
      gap: 12px;
    }
    .mb-12 { margin-bottom: 12px; }
    .mb-16 { margin-bottom: 16px; }
    .btn {
      display: inline-block;
      border: none;
      border-radius: 10px;
      background: var(--accent);
      color: #fff;
      padding: 11px 16px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
    }
    .btn:hover {
      background: var(--accent-dark);
    }
    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 10px;
    }
    .btn-link {
      text-decoration: none;
      padding: 9px 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      color: var(--text);
      background: #fff;
      font-weight: 600;
    }
    .btn-link:hover { background: #f9fafb; }
    .alert {
      border-radius: 10px;
      padding: 10px 12px;
      margin-bottom: 10px;
      font-size: 14px;
    }
    .alert.error {
      color: var(--danger);
      background: #fef2f2;
      border: 1px solid #fecaca;
    }
    .alert.info {
      color: var(--ok);
      background: #ecfdf5;
      border: 1px solid #a7f3d0;
    }
    .alert.notice {
      color: #1d4ed8;
      background: #eff6ff;
      border: 1px solid #bfdbfe;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .topbar__user {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .pill {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 6px 10px;
      background: #e6fffb;
      color: #115e59;
      font-size: 13px;
      font-weight: 700;
    }
    .auth-shell {
      display: grid;
      grid-template-columns: 1.05fr 0.95fr;
      min-height: calc(100vh - 48px);
      gap: 16px;
    }
    .auth-panel,
    .auth-form {
      border-radius: 18px;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(10px);
      box-shadow: 0 16px 40px rgba(10, 20, 40, 0.08);
      overflow: hidden;
    }
    .auth-panel {
      padding: 28px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      background: linear-gradient(180deg, rgba(15, 118, 110, 0.08), rgba(255, 255, 255, 0.92));
    }
    .auth-badge {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 6px 10px;
      background: #0f766e;
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .auth-copy {
      color: var(--muted);
      line-height: 1.6;
      max-width: 56ch;
    }
    .auth-points {
      display: grid;
      gap: 10px;
      margin-top: 16px;
    }
    .auth-point {
      border: 1px solid var(--border);
      background: #fff;
      padding: 12px 14px;
      border-radius: 12px;
      color: var(--text);
    }
    .auth-form {
      padding: 28px;
      align-self: center;
    }
    .muted-link {
      color: var(--accent-dark);
      text-decoration: none;
      font-weight: 600;
    }
    .muted-link:hover {
      text-decoration: underline;
    }
    pre {
      white-space: pre-wrap;
      word-wrap: break-word;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      background: #fafafa;
      max-height: 520px;
      overflow: auto;
      margin: 0;
      line-height: 1.45;
      font-size: 14px;
    }
    @media (max-width: 860px) {
      .grid, .grid-3, .auth-shell { grid-template-columns: 1fr; }
      .auth-form { align-self: stretch; }
    }
  </style>
</head>
<body>
  <div class="container">
    {% block content %}{% endblock %}
  </div>
</body>
</html>
